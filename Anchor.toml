[toolchain]
anchor_version = "0.31.0"

[features]
seeds = true
skip-lint = false

[programs.localnet]
chain_go = "9eFVwR68X9oc3nLyUMgTQu1esXQpgawhGJk7dp1KkKMJ"

[programs.devnet]
chain_go = "9eFVwR68X9oc3nLyUMgTQu1esXQpgawhGJk7dp1KkKMJ"

[registry]
